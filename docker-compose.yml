version: '3.8'

services:
  backend:
    build: .
    container_name: grocery-backend
    ports:
      - "8080:8080"
    volumes:
      - ./grocery.db:/app/grocery.db
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - ADMIN_DISPLAY_NAME=Administrator
    restart: always

  frontend:
    build: ./frontend
    container_name: grocery-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
